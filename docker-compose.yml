# Local dev services for ferri. Postgres is provided separately by the Supabase
# CLI (`supabase start`); this file adds the KV match store.
#
# Redis speaks the RESP protocol, but the app's KV client is HTTP-based, so
# `serverless-redis-http` (SRH) sits in front and exposes a REST API matching
# the production KV provider. Point the app's local .env at SRH:
#
#   UPSTASH_REDIS_REST_URL=http://localhost:8079
#   UPSTASH_REDIS_REST_TOKEN=local_dev_token
#
# Dev only — SRH is not for production.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: local_dev_token
      SRH_CONNECTION_STRING: "redis://redis:6379"
